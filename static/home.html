<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Go Chat Me</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.header{
background:#111;
padding:15px;
font-size:20px;
text-align:center;
border-bottom:1px solid #222;
}

.tabs{
display:flex;
background:#151515;
}

.tab{
flex:1;
text-align:center;
padding:12px;
cursor:pointer;
border-right:1px solid #222;
}

.tab:hover{
background:#222;
}

.content{
padding:15px;
}

.chat-item{
display:flex;
align-items:center;
padding:10px;
border-bottom:1px solid #222;
cursor:pointer;
}

.chat-item:hover{
background:#1c1c1c;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#333;
display:flex;
align-items:center;
justify-content:center;
margin-right:10px;
}

.name{
font-weight:bold;
}

.msg{
font-size:13px;
opacity:0.7;
}

.newchat{
position:fixed;
bottom:20px;
right:20px;
background:#00e5ff;
border:none;
border-radius:50%;
width:60px;
height:60px;
font-size:30px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
Go Chat Me
</div>

<div class="tabs">

<div class="tab" onclick="showTab('chats')">
Chats
</div>

<div class="tab" onclick="showTab('calls')">
Calls
</div>

<div class="tab" onclick="showTab('contacts')">
Contacts
</div>

<div class="tab" onclick="showTab('settings')">
Settings
</div>

</div>

<div class="content" id="content">

<h3>Your Chats</h3>

<div id="chatlist"></div>

</div>

<button class="newchat" onclick="newChat()">+</button>

<script>

let user=localStorage.getItem("gomchat_user")

function showTab(tab){

let c=document.getElementById("content")

if(tab==="chats"){

c.innerHTML="<h3>Your Chats</h3><div id='chatlist'></div>"

loadChats()

}

if(tab==="calls"){

c.innerHTML="<h3>Calls</h3>"

}

if(tab==="contacts"){

c.innerHTML="<input id='search' placeholder='Search user'><div id='results'></div>"

document.getElementById("search").onkeyup=search

}

if(tab==="settings"){

c.innerHTML="<h3>Settings</h3><button onclick='logout()'>Logout</button>"

}

}

function loadChats(){

fetch("/search_users?q=")
.then(r=>r.json())
.then(users=>{

let list=document.getElementById("chatlist")

list.innerHTML=""

users.forEach(u=>{

list.innerHTML+=`
<div class="chat-item" onclick="openChat('${u}')">

<div class="avatar">
${u[0]}
</div>

<div>
<div class="name">${u}</div>
<div class="msg">Tap to chat</div>
</div>

</div>
`

})

})

}

function openChat(friend){

window.location="/chat?user="+friend

}

function newChat(){

showTab("contacts")

}

function search(){

let q=this.value

fetch("/search_users?q="+q)
.then(r=>r.json())
.then(users=>{

let r=document.getElementById("results")

r.innerHTML=""

users.forEach(u=>{

r.innerHTML+=`
<div class="chat-item" onclick="openChat('${u}')">

<div class="avatar">
${u[0]}
</div>

<div class="name">${u}</div>

</div>
`

})

})

}

function logout(){

localStorage.removeItem("gomchat_user")

window.location="/login"

}

loadChats()

</script>

</body>
</html>
