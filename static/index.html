<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>GoChatMe</title>

<link rel="manifest" href="/static/manifest.json">

<style>

body{
font-family:Arial;
background:#f2f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#00b7ff;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00b7ff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.link{
text-align:center;
margin-top:10px;
cursor:pointer;
color:#00b7ff;
}

.status{
font-size:13px;
margin-top:-5px;
margin-bottom:5px;
}

</style>

</head>

<body>

<div class="box" id="loginBox">

<h2>GoChatMe</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="link" onclick="showRegister()">Register</div>
<div class="link" onclick="showForgot()">Forgot Password</div>

</div>


<div class="box" id="registerBox" style="display:none">

<h2>Create Account</h2>

<input id="regUser" placeholder="Username" onkeyup="checkUsername()">

<div id="userStatus" class="status"></div>

<input id="regEmail" placeholder="Email">
<input id="regPhone" placeholder="Phone number">
<input id="regPass" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<div class="link" onclick="showLogin()">Back</div>

</div>


<div class="box" id="forgotBox" style="display:none">

<h2>Recover Password</h2>

<input id="forgotUser" placeholder="Username">
<input id="forgotPhone" placeholder="Phone number">

<button onclick="recover()">Recover</button>

<div class="link" onclick="showLogin()">Back</div>

</div>


<script>

function showRegister(){

loginBox.style.display="none"
forgotBox.style.display="none"
registerBox.style.display="block"

}

function showLogin(){

loginBox.style.display="block"
registerBox.style.display="none"
forgotBox.style.display="none"

}

function showForgot(){

loginBox.style.display="none"
registerBox.style.display="none"
forgotBox.style.display="block"

}


function login(){

fetch("/login",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

username:loginUser.value,
password:loginPass.value

})

})
.then(r=>r.json())
.then(d=>{

if(d.status==="ok"){

localStorage.setItem("gomchat_user",loginUser.value)

window.location="/chat"

}else{

alert("Wrong username or password")

}

})

}


function register(){

fetch("/register",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

username:regUser.value,
email:regEmail.value,
phone:regPhone.value,
password:regPass.value

})

})
.then(r=>r.json())
.then(d=>{

if(d.status==="user_exists"){

alert("Username already exists")

}else{

alert("Account created")

showLogin()

}

})

}


function checkUsername(){

let username = regUser.value

if(username.length < 2){

userStatus.innerText=""
return

}

fetch("/check_username?username="+username)

.then(r=>r.json())

.then(d=>{

if(d.available){

userStatus.innerText="Username available"
userStatus.style.color="green"

}else{

userStatus.innerText="Username already taken"
userStatus.style.color="red"

}

})

}


function recover(){

fetch("/forgot",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

username:forgotUser.value,
phone:forgotPhone.value

})

})
.then(r=>r.json())
.then(d=>{

if(d.password){

alert("Your password: "+d.password)

}else{

alert("User not found")

}

})

}


/* PWA */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("/static/sw.js")

}

</script>

</body>
</html>
