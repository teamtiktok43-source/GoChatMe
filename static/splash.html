<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Go Chat Me</title>

<style>

body{
margin:0;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
flex-direction:column;
}

.logo{
font-size:60px;
font-weight:bold;
background:linear-gradient(45deg,#00e5ff,#6f00ff);
-webkit-background-clip:text;
color:transparent;
animation:glow 2s infinite alternate;
}

.tag{
margin-top:10px;
opacity:0.8;
}

.loader{
margin-top:30px;
border:4px solid #222;
border-top:4px solid #00e5ff;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@keyframes glow{
0%{text-shadow:0 0 10px #00e5ff;}
100%{text-shadow:0 0 30px #6f00ff;}
}

</style>

</head>

<body>

<div class="logo">💬 G</div>

<div class="tag">Go Chat Me</div>

<div class="loader"></div>

<script>

setTimeout(()=>{

let user=localStorage.getItem("gomchat_user")

if(user){

window.location="/home"

}else{

window.location="/login"

}

},2500)

</script>

</body>

</html>
